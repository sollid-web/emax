<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rigGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Mining Rig 1 -->
  <g transform="translate(50, 150)">
    <!-- Rig Frame -->
    <rect x="0" y="0" width="120" height="80" rx="8" fill="url(#rigGradient)" stroke="#4b5563" stroke-width="2"/>
    
    <!-- GPU Cards -->
    <rect x="10" y="15" width="25" height="50" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="15" width="25" height="50" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="70" y="15" width="25" height="50" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Status LEDs -->
    <circle cx="105" cy="25" r="3" fill="#10b981">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="35" r="3" fill="#f59e0b">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hash Rate Display -->
    <rect x="5" y="70" width="110" height="8" rx="2" fill="#111827"/>
    <text x="60" y="77" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="6">125.4 TH/s</text>
  </g>
  
  <!-- Mining Rig 2 -->
  <g transform="translate(200, 120)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="url(#rigGradient)" stroke="#4b5563" stroke-width="2"/>
    
    <!-- GPU Cards (6 cards) -->
    <rect x="10" y="15" width="20" height="70" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="35" y="15" width="20" height="70" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.8;1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="15" width="20" height="70" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="85" y="15" width="20" height="70" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.8;1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="15" width="20" height="70" rx="3" fill="url(#gpuGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Power Display -->
    <text x="70" y="95" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="6">3.2 kW</text>
  </g>
  
  <!-- Mining Rig 3 -->
  <g transform="translate(380, 140)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="url(#rigGradient)" stroke="#4b5563" stroke-width="2"/>
    
    <!-- ASIC Miners -->
    <rect x="15" y="20" width="130" height="25" rx="5" fill="#1f2937" stroke="#374151"/>
    <rect x="15" y="50" width="130" height="25" rx="5" fill="#1f2937" stroke="#374151"/>
    
    <!-- Fans -->
    <circle cx="30" cy="32" r="8" fill="#4b5563" stroke="#6b7280">
      <animateTransform attributeName="transform" type="rotate" values="0 30 32;360 30 32" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="32" r="8" fill="#4b5563" stroke="#6b7280">
      <animateTransform attributeName="transform" type="rotate" values="0 130 32;360 130 32" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="62" r="8" fill="#4b5563" stroke="#6b7280">
      <animateTransform attributeName="transform" type="rotate" values="0 30 62;360 30 62" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="62" r="8" fill="#4b5563" stroke="#6b7280">
      <animateTransform attributeName="transform" type="rotate" values="0 130 62;360 130 62" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Heat Waves -->
  <g opacity="0.6">
    <path d="M 85 140 Q 90 130 95 140 Q 100 130 105 140" stroke="#f59e0b" stroke-width="2" fill="none">
      <animate attributeName="d" values="M 85 140 Q 90 130 95 140 Q 100 130 105 140;M 85 140 Q 90 125 95 140 Q 100 125 105 140;M 85 140 Q 90 130 95 140 Q 100 130 105 140" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 270 110 Q 275 100 280 110 Q 285 100 290 110" stroke="#f59e0b" stroke-width="2" fill="none">
      <animate attributeName="d" values="M 270 110 Q 275 100 280 110 Q 285 100 290 110;M 270 110 Q 275 95 280 110 Q 285 95 290 110;M 270 110 Q 275 100 280 110 Q 285 100 290 110" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 130 Q 465 120 470 130 Q 475 120 480 130" stroke="#f59e0b" stroke-width="2" fill="none">
      <animate attributeName="d" values="M 460 130 Q 465 120 470 130 Q 475 120 480 130;M 460 130 Q 465 115 470 130 Q 475 115 480 130;M 460 130 Q 465 120 470 130 Q 475 120 480 130" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating Bitcoin Rewards -->
  <g>
    <!-- Bitcoin 1 -->
    <g transform="translate(120, 80)">
      <circle cx="0" cy="0" r="12" fill="#f7931a" stroke="#ffffff" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0,0;-5,-20;0,0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">₿</text>
    </g>
    
    <!-- Bitcoin 2 -->
    <g transform="translate(320, 60)">
      <circle cx="0" cy="0" r="12" fill="#f7931a" stroke="#ffffff" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0,0;5,-25;0,0" dur="5s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">₿</text>
    </g>
    
    <!-- Bitcoin 3 -->
    <g transform="translate(500, 90)">
      <circle cx="0" cy="0" r="12" fill="#f7931a" stroke="#ffffff" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0,0;-3,-18;0,0" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">₿</text>
    </g>
  </g>
  
  <!-- Network Connection Lines -->
  <g stroke="#10b981" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 170 190 L 200 180">
      <animate attributeName="stroke-dasharray" values="0,10;10,0;0,10" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 340 170 L 380 180">
      <animate attributeName="stroke-dasharray" values="0,10;10,0;0,10" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Network Statistics -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="500" height="60" rx="8" fill="#111827" fill-opacity="0.8" stroke="#374151"/>
    <text x="20" y="25" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">Network Hash Rate: 245.7 EH/s</text>
    <text x="20" y="45" fill="#f59e0b" font-family="monospace" font-size="12">Power Consumption: 12.4 MW | Efficiency: 95.2%</text>
    <text x="350" y="25" fill="#3b82f6" font-family="monospace" font-size="12">Blocks Mined: 1,247</text>
    <text x="350" y="45" fill="#8b5cf6" font-family="monospace" font-size="12">Daily Revenue: $45,230</text>
  </g>
</svg>
