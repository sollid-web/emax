<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Central DeFi Hub -->
  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="60" fill="url(#hubGradient)" filter="url(#glow)" stroke="#60a5fa" stroke-width="3">
      <animate attributeName="r" values="60;65;60" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-10" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">DeFi</text>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Protocol</text>
    <text x="0" y="20" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">TVL: $2.4B</text>
  </g>
  
  <!-- Liquidity Pools -->
  <!-- Pool 1: ETH/USDC -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="40" fill="url(#poolGradient)" filter="url(#glow)" stroke="#34d399" stroke-width="2">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ETH/USDC</text>
    <text x="0" y="8" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="8">APY: 12.5%</text>
    <text x="0" y="18" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="8">$450M</text>
  </g>
  
  <!-- Pool 2: BTC/ETH -->
  <g transform="translate(600, 150)">
    <circle cx="0" cy="0" r="40" fill="url(#poolGradient)" filter="url(#glow)" stroke="#34d399" stroke-width="2">
      <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">BTC/ETH</text>
    <text x="0" y="8" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="8">APY: 8.7%</text>
    <text x="0" y="18" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="8">$320M</text>
  </g>
  
  <!-- Pool 3: USDC/DAI -->
  <g transform="translate(150, 450)">
    <circle cx="0" cy="0" r="35" fill="url(#poolGradient)" filter="url(#glow)" stroke="#34d399" stroke-width="2">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">USDC/DAI</text>
    <text x="0" y="6" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="7">APY: 4.2%</text>
    <text x="0" y="15" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="7">$180M</text>
  </g>
  
  <!-- Pool 4: LINK/ETH -->
  <g transform="translate(650, 450)">
    <circle cx="0" cy="0" r="35" fill="url(#poolGradient)" filter="url(#glow)" stroke="#34d399" stroke-width="2">
      <animate attributeName="opacity" values="1;0.9;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">LINK/ETH</text>
    <text x="0" y="6" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="7">APY: 15.3%</text>
    <text x="0" y="15" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="7">$95M</text>
  </g>
  
  <!-- Governance Tokens -->
  <g>
    <!-- Token 1 -->
    <g transform="translate(100, 100)">
      <circle cx="0" cy="0" r="15" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="10s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">GOV</text>
    </g>
    
    <!-- Token 2 -->
    <g transform="translate(700, 100)">
      <circle cx="0" cy="0" r="15" fill="#f59e0b" stroke="#fbbf24" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="12s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">DAO</text>
    </g>
    
    <!-- Token 3 -->
    <g transform="translate(100, 500)">
      <circle cx="0" cy="0" r="15" fill="#ef4444" stroke="#f87171" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">UNI</text>
    </g>
    
    <!-- Token 4 -->
    <g transform="translate(700, 500)">
      <circle cx="0" cy="0" r="15" fill="#06b6d4" stroke="#22d3ee" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="9s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="3" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">COMP</text>
    </g>
  </g>
  
  <!-- Liquidity Flow Lines -->
  <g stroke="#10b981" stroke-width="3" fill="none" opacity="0.6">
    <!-- Hub to Pools -->
    <path d="M 360 260 L 220 170">
      <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 440 260 L 580 170">
      <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 360 340 L 170 430">
      <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 440 340 L 630 430">
      <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Yield Farming Rewards -->
  <g>
    <!-- Reward 1 -->
    <g transform="translate(250, 200)">
      <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0,0;-10,-30;0,0" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="2" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">$</text>
    </g>
    
    <!-- Reward 2 -->
    <g transform="translate(550, 200)">
      <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0,0;10,-25;0,0" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="2" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">$</text>
    </g>
    
    <!-- Reward 3 -->
    <g transform="translate(200, 400)">
      <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0,0;-5,-20;0,0" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="2" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">$</text>
    </g>
  </g>
  
  <!-- Data Particles -->
  <g>
    <!-- Particle 1 -->
    <circle cx="300" cy="250" r="2" fill="#3b82f6">
      <animateMotion dur="6s" repeatCount="indefinite">
        <path d="M 0,0 Q 50,-30 100,0 Q 150,30 200,0"/>
      </animateMotion>
    </circle>
    
    <!-- Particle 2 -->
    <circle cx="500" cy="350" r="2" fill="#10b981">
      <animateMotion dur="7s" repeatCount="indefinite">
        <path d="M 0,0 Q -50,30 -100,0 Q -150,-30 -200,0"/>
      </animateMotion>
    </circle>
    
    <!-- Particle 3 -->
    <circle cx="400" cy="200" r="2" fill="#8b5cf6">
      <animateMotion dur="5s" repeatCount="indefinite">
        <path d="M 0,0 Q 0,-50 0,-100 Q 0,-150 0,-200"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Statistics Panel -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="300" height="80" rx="8" fill="#111827" fill-opacity="0.9" stroke="#374151"/>
    <text x="15" y="25" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold">Total Value Locked: $2.4B</text>
    <text x="15" y="45" fill="#10b981" font-family="monospace" font-size="12">24h Volume: $156M</text>
    <text x="15" y="65" fill="#f59e0b" font-family="monospace" font-size="12">Active Users: 45,230</text>
  </g>
  
  <!-- Protocol Stats -->
  <g transform="translate(450, 50)">
    <rect x="0" y="0" width="300" height="80" rx="8" fill="#111827" fill-opacity="0.9" stroke="#374151"/>
    <text x="15" y="25" fill="#8b5cf6" font-family="monospace" font-size="12" font-weight="bold">Governance Proposals: 127</text>
    <text x="15" y="45" fill="#ef4444" font-family="monospace" font-size="12">Avg APY: 11.2%</text>
    <text x="15" y="65" fill="#06b6d4" font-family="monospace" font-size="12">Protocols: 24 Active</text>
  </g>
</svg>
