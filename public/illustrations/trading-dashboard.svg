<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dashboardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="chartRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dashboard Background -->
  <rect width="600" height="400" fill="url(#dashboardBg)" rx="12"/>
  
  <!-- Header Bar -->
  <rect x="20" y="20" width="560" height="50" fill="#1f2937" rx="8" opacity="0.8"/>
  <text x="40" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Trading Dashboard</text>
  
  <!-- Portfolio Value -->
  <rect x="450" y="30" width="120" height="30" fill="#059669" rx="4" opacity="0.9"/>
  <text x="460" y="48" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">$127,543.21</text>
  
  <!-- Main Chart Area -->
  <rect x="30" y="90" width="350" height="200" fill="#374151" rx="8" opacity="0.7"/>
  
  <!-- Chart Grid Lines -->
  <g stroke="#6b7280" stroke-width="0.5" opacity="0.3">
    <line x1="30" y1="130" x2="380" y2="130"/>
    <line x1="30" y1="170" x2="380" y2="170"/>
    <line x1="30" y1="210" x2="380" y2="210"/>
    <line x1="30" y1="250" x2="380" y2="250"/>
    <line x1="80" y1="90" x2="80" y2="290"/>
    <line x1="130" y1="90" x2="130" y2="290"/>
    <line x1="180" y1="90" x2="180" y2="290"/>
    <line x1="230" y1="90" x2="230" y2="290"/>
    <line x1="280" y1="90" x2="280" y2="290"/>
    <line x1="330" y1="90" x2="330" y2="290"/>
  </g>
  
  <!-- Candlestick Chart -->
  <g>
    <!-- Green Candles -->
    <rect x="50" y="180" width="8" height="40" fill="#10b981"/>
    <line x1="54" y1="170" x2="54" y2="230" stroke="#10b981" stroke-width="2"/>
    
    <rect x="90" y="160" width="8" height="50" fill="#10b981"/>
    <line x1="94" y1="150" x2="94" y2="220" stroke="#10b981" stroke-width="2"/>
    
    <rect x="170" y="140" width="8" height="45" fill="#10b981"/>
    <line x1="174" y1="130" x2="174" y2="195" stroke="#10b981" stroke-width="2"/>
    
    <rect x="250" y="120" width="8" height="55" fill="#10b981"/>
    <line x1="254" y1="110" x2="254" y2="185" stroke="#10b981" stroke-width="2"/>
    
    <!-- Red Candles -->
    <rect x="70" y="200" width="8" height="35" fill="#ef4444"/>
    <line x1="74" y1="190" x2="74" y2="245" stroke="#ef4444" stroke-width="2"/>
    
    <rect x="130" y="190" width="8" height="40" fill="#ef4444"/>
    <line x1="134" y1="180" x2="134" y2="240" stroke="#ef4444" stroke-width="2"/>
    
    <rect x="210" y="170" width="8" height="30" fill="#ef4444"/>
    <line x1="214" y1="160" x2="214" y2="210" stroke="#ef4444" stroke-width="2"/>
    
    <rect x="290" y="150" width="8" height="45" fill="#ef4444"/>
    <line x1="294" y1="140" x2="294" y2="205" stroke="#ef4444" stroke-width="2"/>
    
    <rect x="330" y="130" width="8" height="50" fill="#ef4444"/>
    <line x1="334" y1="120" x2="334" y2="190" stroke="#ef4444" stroke-width="2"/>
  </g>
  
  <!-- Price Line -->
  <polyline points="50,200 90,180 130,190 170,160 210,175 250,140 290,165 330,145 370,135" 
            fill="none" stroke="#3b82f6" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="3s" repeatCount="indefinite"/>
  </polyline>
  
  <!-- Volume Bars -->
  <rect x="50" y="300" width="8" height="20" fill="#6366f1" opacity="0.6"/>
  <rect x="70" y="305" width="8" height="15" fill="#6366f1" opacity="0.6"/>
  <rect x="90" y="295" width="8" height="25" fill="#6366f1" opacity="0.6"/>
  <rect x="130" y="300" width="8" height="20" fill="#6366f1" opacity="0.6"/>
  <rect x="170" y="290" width="8" height="30" fill="#6366f1" opacity="0.6"/>
  <rect x="210" y="305" width="8" height="15" fill="#6366f1" opacity="0.6"/>
  <rect x="250" y="285" width="8" height="35" fill="#6366f1" opacity="0.6"/>
  <rect x="290" y="300" width="8" height="20" fill="#6366f1" opacity="0.6"/>
  <rect x="330" y="295" width="8" height="25" fill="#6366f1" opacity="0.6"/>
  
  <!-- Side Panel - Portfolio -->
  <rect x="400" y="90" width="180" height="120" fill="#374151" rx="8" opacity="0.7"/>
  <text x="415" y="110" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Portfolio</text>
  
  <!-- Portfolio Items -->
  <circle cx="425" cy="135" r="6" fill="#f59e0b"/>
  <text x="440" y="140" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">BTC: 2.5431</text>
  <text x="540" y="140" fill="#10b981" font-family="Arial, sans-serif" font-size="11">+5.2%</text>
  
  <circle cx="425" cy="155" r="6" fill="#6366f1"/>
  <text x="440" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">ETH: 15.234</text>
  <text x="540" y="160" fill="#10b981" font-family="Arial, sans-serif" font-size="11">+3.8%</text>
  
  <circle cx="425" cy="175" r="6" fill="#8b5cf6"/>
  <text x="440" y="180" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">ADA: 1,250</text>
  <text x="540" y="180" fill="#ef4444" font-family="Arial, sans-serif" font-size="11">-1.2%</text>
  
  <circle cx="425" cy="195" r="6" fill="#06b6d4"/>
  <text x="440" y="200" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">DOT: 89.12</text>
  <text x="540" y="200" fill="#10b981" font-family="Arial, sans-serif" font-size="11">+7.1%</text>
  
  <!-- Trading Panel -->
  <rect x="400" y="230" width="180" height="140" fill="#374151" rx="8" opacity="0.7"/>
  <text x="415" y="250" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Quick Trade</text>
  
  <!-- Buy/Sell Buttons -->
  <rect x="415" y="270" width="70" height="25" fill="#10b981" rx="4"/>
  <text x="440" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">BUY</text>
  
  <rect x="495" y="270" width="70" height="25" fill="#ef4444" rx="4"/>
  <text x="520" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">SELL</text>
  
  <!-- Amount Input -->
  <rect x="415" y="310" width="150" height="20" fill="#1f2937" rx="3"/>
  <text x="420" y="323" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">Amount: 0.5 BTC</text>
  
  <!-- Execute Button -->
  <rect x="415" y="340" width="150" height="25" fill="#3b82f6" rx="4"/>
  <text x="475" y="355" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">EXECUTE</text>
  
  <!-- Animated Elements -->
  <circle cx="560" cy="50" r="3" fill="#10b981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="570" cy="50" r="3" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="580" cy="50" r="3" fill="#f59e0b">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Data Flow Animation -->
  <circle cx="30" cy="190" r="2" fill="#3b82f6" opacity="0.8">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#dataPath"/>
    </animateMotion>
  </circle>
  
  <path id="dataPath" d="M30,190 Q200,100 370,150" fill="none" opacity="0"/>
</svg>
