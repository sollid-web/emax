<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="walletGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#581c87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="securityShield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.3" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="300" fill="#0f172a" rx="15"/>
  
  <!-- Hardware Wallet Device -->
  <rect x="180" y="80" width="140" height="140" fill="url(#walletGradient)" rx="12" filter="url(#dropShadow)"/>
  
  <!-- Wallet Screen -->
  <rect x="195" y="95" width="110" height="70" fill="#000000" rx="6"/>
  <rect x="200" y="100" width="100" height="60" fill="url(#screenGlow)" rx="4" opacity="0.8"/>
  
  <!-- Screen Content -->
  <text x="250" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SECURE WALLET</text>
  <text x="250" y="135" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="8">Balance:</text>
  <text x="250" y="150" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2.5431 BTC</text>
  
  <!-- Wallet Buttons -->
  <circle cx="210" cy="185" r="8" fill="#374151"/>
  <circle cx="250" cy="185" r="8" fill="#374151"/>
  <circle cx="290" cy="185" r="8" fill="#374151"/>
  
  <!-- USB Port -->
  <rect x="240" y="220" width="20" height="8" fill="#1f2937" rx="2"/>
  <rect x="242" y="222" width="16" height="4" fill="#4b5563" rx="1"/>
  
  <!-- Security Shield -->
  <circle cx="120" cy="150" r="40" fill="url(#securityShield)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Shield Icon -->
  <path d="M120,120 L105,135 L120,180 L135,135 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M120,130 L110,140 L120,170 L130,140 Z" fill="#10b981"/>
  
  <!-- Checkmark in Shield -->
  <path d="M115,145 L118,148 L125,140" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Floating Cryptocurrency Icons -->
  <!-- Bitcoin -->
  <circle cx="80" cy="80" r="20" fill="#f59e0b" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="80" y="87" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">₿</text>
  
  <!-- Ethereum -->
  <circle cx="420" cy="100" r="18" fill="#6366f1" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <polygon points="420,90 415,100 420,105 425,100" fill="#ffffff"/>
  <polygon points="420,95 415,100 420,110 425,100" fill="#ffffff" opacity="0.7"/>
  
  <!-- Litecoin -->
  <circle cx="60" cy="220" r="16" fill="#a3a3a3" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="227" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Ł</text>
  
  <!-- Cardano -->
  <circle cx="440" cy="200" r="16" fill="#0033ad" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="200" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="440" cy="200" r="4" fill="#ffffff"/>
  
  <!-- Connection Lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.6" fill="none">
    <path d="M100,90 Q140,120 180,130">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M400,110 Q360,140 320,150">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M76,210 Q130,190 180,180">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </path>
    <path d="M424,190 Q380,170 320,170">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Data Flow Particles -->
  <circle cx="100" cy="90" r="2" fill="#3b82f6">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="400" cy="110" r="2" fill="#10b981">
    <animateMotion dur="4s" begin="1s" repeatCount="indefinite">
      <mpath href="#path2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <path id="path1" d="M100,90 Q140,120 180,130" fill="none" opacity="0"/>
  <path id="path2" d="M400,110 Q360,140 320,150" fill="none" opacity="0"/>
  
  <!-- Multi-signature Indicators -->
  <g transform="translate(350, 50)">
    <circle cx="0" cy="0" r="12" fill="#8b5cf6" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">2/3</text>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Status Indicators -->
  <g transform="translate(380, 250)">
    <rect x="0" y="0" width="80" height="30" fill="#1f2937" rx="4" opacity="0.8"/>
    <circle cx="10" cy="15" r="4" fill="#10b981">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="18" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">SECURE</text>
  </g>
  
  <!-- Transaction History -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="120" height="40" fill="#374151" rx="6" opacity="0.7"/>
    <text x="5" y="15" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Recent Transactions</text>
    <text x="5" y="28" fill="#10b981" font-family="Arial, sans-serif" font-size="8">+0.0234 BTC</text>
    <text x="5" y="38" fill="#ef4444" font-family="Arial, sans-serif" font-size="8">-0.0156 ETH</text>
  </g>
  
  <!-- Backup Seed Phrase Indicator -->
  <g transform="translate(250, 40)">
    <rect x="0" y="0" width="100" height="20" fill="#059669" rx="10" opacity="0.8"/>
    <text x="50" y="13" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="bold">BACKUP SECURED</text>
  </g>
</svg>
